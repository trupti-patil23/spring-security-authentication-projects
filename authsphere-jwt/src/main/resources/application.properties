spring.application.name=auth-sphere-jwt

# Server
server.port=8080

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/auth_jwt_db
spring.datasource.username=root
spring.datasource.password=rootroot

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Logging
logging.level.org.springframework.security=DEBUG

#JWT expiration times: access token (short-lived for API security- 5 min)  
jwt.access-token-expiration=300000 

#JWT expiration times: refresh token (long-lived for session continuity - 7 days)
jwt.refresh.expiration=604800000

