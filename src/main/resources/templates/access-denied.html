<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Access Denied</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8d7da;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        .container {
            margin-top: 100px;
        }

        .card {
            display: inline-block;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px #ccc;
            width: 400px;
        }

        h2 {
            color: #dc3545;
        }

        p {
            margin: 15px 0;
            font-size: 16px;
        }

        .btn {
            display: inline-block;
            padding: 10px 15px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 15px;
        }

        .btn:hover {
            background-color: #0056b3;
        }

        .icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="card">

        <div class="icon">⛔</div>

        <h2>Access Denied</h2>

        <p>You do not have permission to view this page.</p>

        <p th:if="${#authentication != null}">
            Logged in as: <strong th:text="${#authentication.name}"></strong>
        </p>

        <a href="/user" class="btn">Go to Dashboard</a>

    </div>
</div>

</body>
</html>
